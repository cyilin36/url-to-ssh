<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{% block title %}url-to-ssh{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body data-csrf="{{ csrf_token() }}">
  {% if session.get('authenticated') %}
  <header class="topbar">
    <a class="brand" href="{{ url_for('dashboard') }}" aria-label="返回主机列表">
      <span class="brand-mark" aria-hidden="true">u→s</span>
      <span><strong>url-to-ssh</strong><small>网络控制台</small></span>
    </a>
    <nav aria-label="主导航">
      <a href="{{ url_for('dashboard') }}" {% if request.endpoint == 'dashboard' %}aria-current="page"{% endif %}>主机</a>
      <a href="{{ url_for('command_library') }}" {% if request.endpoint == 'command_library' %}aria-current="page"{% endif %}>指令库</a>
      <form method="post" action="{{ url_for('logout') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button class="nav-button" type="submit">退出</button>
      </form>
    </nav>
  </header>
  {% endif %}

  <main class="page-shell {% block shell_class %}{% endblock %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="notice notice-{{ category }}" role="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
