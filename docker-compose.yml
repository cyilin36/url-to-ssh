services:
  url-to-ssh:
    image: ghcr.io/cyilin36/url-to-ssh:latest
    container_name: url-to-ssh
    restart: always
    network_mode: host
    environment:
      - HTTP_PORT=9091
      - DATA_DIR=/data
      # 可选：首次启动时自动创建管理员密码
      # - ADMIN_PASSWORD=change-me-now
      # 可选：建议由密码管理器生成并固定，变更后旧数据无法解密
      # - APP_SECRET=replace-with-a-long-random-secret
    volumes:
      - url-to-ssh-data:/data

volumes:
  url-to-ssh-data:
